name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to Azure VM via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.AZURE_VM_IP }}
        username: ${{ secrets.AZURE_VM_USERNAME }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        script: |
          # Find the directory containing docker-compose.yml in the home folder
          APP_FILE=$(find ~ -maxdepth 3 -name "docker-compose.yml" -type f 2>/dev/null | head -n 1)
          
          if [ -z "$APP_FILE" ]; then
            echo "Error: Could not find the app directory containing docker-compose.yml"
            exit 1
          fi
          
          APP_DIR=$(dirname "$APP_FILE")
          echo "Found app in: $APP_DIR"
          cd "$APP_DIR"
          
          # Fix git ownership issue if cloned via sudo
          git config --global --add safe.directory "$APP_DIR"
          sudo git config --global --add safe.directory "$APP_DIR"
          
          # Pull the latest changes from GitHub (using sudo because files are owned by root)
          sudo git reset --hard
          sudo git pull origin main
          
          # Rebuild and restart the containers with 10 workers (using sudo for permissions)
          sudo docker compose up -d --build --scale worker=10
