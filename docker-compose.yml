version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: always
    # .env is no longer baked into the image (.dockerignore) — inject at runtime
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - FLASK_ENV=production
      - NOVUS_API_KEY=${NOVUS_API_KEY:?NOVUS_API_KEY must be set for production}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://novus-analytics.centralindia.cloudapp.azure.com}
    expose:
      - "5001"
    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data
    command: gunicorn --bind 0.0.0.0:5001 --workers 2 --timeout 300 "app:app"
    depends_on:
      - redis

  worker:
    build: .
    restart: always
    deploy:
      replicas: 10
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data
    command: rq worker financial_analysis --url redis://redis:6379/0
    depends_on:
      - redis

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: always
    expose:
      - "3000"

volumes:
  redis_data:
  chroma_data:
  caddy_data:
  caddy_config:
